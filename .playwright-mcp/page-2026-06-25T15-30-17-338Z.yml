  - generic [ref=e117]:
    - main [ref=e118]:
      - generic [ref=e120]:
        - heading "01 · Claude Code 简介 Permalink to \"01 · Claude Code 简介\"" [level=1] [ref=e121]:
          - text: 01 · Claude Code 简介
          - link "Permalink to \"01 · Claude Code 简介\"" [ref=e122] [cursor=pointer]:
            - /url: "#_01-·-claude-code-简介"
            - text: "#"
        - paragraph [ref=e123]:
          - emphasis [ref=e124]: 是什么、能做什么、和 ChatGPT / Copilot / Cursor 到底差在哪
        - blockquote [ref=e125]:
          - paragraph [ref=e126]:
            - text: 📚
            - strong [ref=e127]: 系列导航
            - text: ：这是「Claude Code 小白教程」的第一篇。从这里出发，咱们一路把它装好、用熟，最后塞进你每天的开发流程。下一篇就动手安装。
        - paragraph [ref=e128]: 兄弟们，今天聊 Claude Code。
        - paragraph [ref=e129]:
          - text: 我猜你点进来，大概率是这么个状态：身边总有人念叨「Claude Code 多猛多猛」，X（推特）上隔三差五刷到「一句话让它把项目重构了」的截图，可你打开它的官网，看半天还是没搞懂——
          - strong [ref=e130]: 它跟我天天用的 ChatGPT 到底差在哪？跟编辑器里那个自动补全的 Copilot 又差在哪？
        - paragraph [ref=e131]: 说白了，名字里带个 Code，很容易让人以为它就是「会写代码的聊天框」。但真上手用过你会发现，这个理解差得有点远。
        - paragraph [ref=e132]:
          - text: 这一篇不教你装、不教你敲命令（那是下一篇的事）。
          - strong [ref=e133]: 这一篇只干一件事：把「Claude Code 到底是个啥」给你彻底讲明白
          - text: ，让你心里有个整体地图——知道它能干什么、不能干什么、什么场景该用它而不是别的工具。地图有了，后面每一步才不会走迷糊。
        - paragraph [ref=e134]:
          - strong [ref=e135]: 看完这一篇，你会拿到：
        - list [ref=e136]:
          - listitem [ref=e137]: 一句话能跟人解释清楚「Claude Code 是什么」
          - listitem [ref=e138]: 一张「能做 / 不能做」清单，知道它的天花板在哪
          - listitem [ref=e139]: 一张对比表，再也不会把它和 ChatGPT / Copilot / Cursor 搞混
          - listitem [ref=e140]: 一个判断标准：什么活儿该交给它，什么活儿别指望它
        - separator [ref=e141]
        - heading "01 Claude Code 到底是个啥 Permalink to \"01 Claude Code 到底是个啥\"" [level=2] [ref=e142]:
          - text: 01 Claude Code 到底是个啥
          - link "Permalink to \"01 Claude Code 到底是个啥\"" [ref=e143] [cursor=pointer]:
            - /url: "#_01-claude-code-到底是个啥"
            - text: "#"
        - paragraph [ref=e144]:
          - text: 先给结论：
          - strong [ref=e145]: Claude Code 是 Anthropic 官方出的「命令行版 AI 编程搭档」——它能读你的整个项目、直接改文件、跑命令，而不只是在聊天框里给你回一段代码
          - text: 。
        - paragraph [ref=e146]: Anthropic 就是做出 Claude 这个大模型的公司（你可以把它理解成 ChatGPT 背后那家 OpenAI 的同行竞品）。Claude Code 就是这家公司专门为「写代码」这个场景做的工具。
        - paragraph [ref=e147]: 这里有个关键区别，新手最容易栽在这：
        - paragraph [ref=e148]:
          - strong [ref=e149]: 类比：顾问 vs 坐你旁边的搭档。
          - text: 网页版的 Claude（或者 ChatGPT）像个顾问——你把代码截图、复制粘贴给他，他看一眼给你出主意，但
          - strong [ref=e150]: 改代码这事还得你自己回去手动干
          - text: 。Claude Code 不一样，它像个真坐在你工位旁边的搭档：你的整个项目摊在他面前，他能直接翻文件、动手改、改完还能跑一遍看对不对。
        - paragraph [ref=e151]: 这个差别，落到实际就是体验上的天壤之别。
        - paragraph [ref=e152]:
          - text: 举个例子。用网页版 Claude 改一个 Python 小项目时，流程是这样的：复制报错信息粘进对话框 → 它告诉你可能是哪个文件的问题 → 你切回编辑器找到那个文件 → 复制相关代码再粘回去 → 它给修改建议 → 你再手动抄回编辑器。
          - strong [ref=e153]: 一个小 bug 来回切五六次窗口，半小时就这么没了。
          - text: 换成 Claude Code，同样的活儿，你就一句「这个报错你帮我查一下根因然后修了」，它自己翻遍相关文件、定位、改完，喝口水的功夫就好了。
        - paragraph [ref=e154]:
          - text: 这一下就能体会到「代理（Agent）」这个词的分量——
          - strong [ref=e155]: 它不是给你建议，是替你动手
          - text: 。
        - blockquote [ref=e156]:
          - paragraph [ref=e157]:
            - text: 💡
            - strong [ref=e158]: 一句话总结
            - text: ：Claude Code = 能读你整个项目、能直接动手改的 AI 编程搭档，不是「会写代码的聊天框」。
        - separator [ref=e159]
        - heading "02 它在哪儿运行：不止是个黑乎乎的终端 Permalink to \"02 它在哪儿运行：不止是个黑乎乎的终端\"" [level=2] [ref=e160]:
          - text: 02 它在哪儿运行：不止是个黑乎乎的终端
          - link "Permalink to \"02 它在哪儿运行：不止是个黑乎乎的终端\"" [ref=e161] [cursor=pointer]:
            - /url: "#_02-它在哪儿运行-不止是个黑乎乎的终端"
            - text: "#"
        - paragraph [ref=e162]:
          - text: 提到「命令行」「终端」，很多新手脑子里立马浮现一个黑乎乎的窗口，瞬间劝退。
          - strong [ref=e163]: 别慌，这是个常见误解。
        - paragraph [ref=e164]:
          - text: 终端（Terminal，就是你电脑里那个敲命令的窗口）确实是 Claude Code 最核心、功能最全的形态，但
          - strong [ref=e165]: 它早就不只活在终端里了
          - text: 。按官方文档，Claude Code 现在有这么几个「身份」：
        - table [ref=e166]:
          - rowgroup [ref=e167]:
            - row "你在哪用 形态 适合谁 / 什么场景" [ref=e168]:
              - columnheader "你在哪用" [ref=e169]
              - columnheader "形态" [ref=e170]
              - columnheader "适合谁 / 什么场景" [ref=e171]
          - rowgroup [ref=e172]:
            - row "终端 功能最全的 CLI（命令行界面） 想用全部能力、写脚本、做自动化的人" [ref=e173]:
              - cell "终端" [ref=e174]:
                - strong [ref=e175]: 终端
              - cell "功能最全的 CLI（命令行界面）" [ref=e176]
              - cell "想用全部能力、写脚本、做自动化的人" [ref=e177]
            - row "VS Code / Cursor 编辑器插件，内联看改动 平时就在 VS Code 里写代码的人" [ref=e178]:
              - cell "VS Code / Cursor" [ref=e179]:
                - strong [ref=e180]: VS Code / Cursor
              - cell "编辑器插件，内联看改动" [ref=e181]
              - cell "平时就在 VS Code 里写代码的人" [ref=e182]
            - row "JetBrains IntelliJ / PyCharm 等插件 Java / Python 重度用户" [ref=e183]:
              - cell "JetBrains" [ref=e184]:
                - strong [ref=e185]: JetBrains
              - cell "IntelliJ / PyCharm 等插件" [ref=e186]
              - cell "Java / Python 重度用户" [ref=e187]
            - row "桌面 App 独立应用，可视化看 diff、并行多会话 不想碰命令行、喜欢点界面的人" [ref=e188]:
              - cell "桌面 App" [ref=e189]:
                - strong [ref=e190]: 桌面 App
              - cell "独立应用，可视化看 diff、并行多会话" [ref=e191]
              - cell "不想碰命令行、喜欢点界面的人" [ref=e192]
            - row "网页 / 手机 浏览器或 Claude iOS App 里跑 临时起个长任务、出门用手机盯进度" [ref=e193]:
              - cell "网页 / 手机" [ref=e194]:
                - strong [ref=e195]: 网页 / 手机
              - cell "浏览器或 Claude iOS App 里跑" [ref=e196]
              - cell "临时起个长任务、出门用手机盯进度" [ref=e197]
        - paragraph [ref=e198]: 这里有个特别关键、官方反复强调的点，我单独拎出来加粗：
        - paragraph [ref=e199]:
          - strong [ref=e200]: 所有这些形态，底层是同一个 Claude Code 引擎。
          - text: 也就是说，你写的
          - code [ref=e201]: CLAUDE.md
          - text: （项目说明文件）、你的配置、你接的 MCP（Model Context Protocol）服务——在终端配好了，换到 VS Code、换到手机上照样生效。
          - strong [ref=e202]: 配一次，处处能用。
        - paragraph [ref=e203]: 很多人主力用终端（习惯了，最顺手），但出门在外时可以用网页版起一个「跑测试 + 修失败用例」的长任务，路上打开手机瞄一眼进度。这种「换个地方接着干」的体验，是网页聊天框给不了的。
        - paragraph [ref=e204]:
          - strong [ref=e205]: 友情提示：
          - text: 本系列默认从
          - strong [ref=e206]: 终端
          - text: 讲起，因为它功能最全、最能讲透原理。等你摸熟了，再换到 VS Code 或桌面 App 都是水到渠成的事。
        - blockquote [ref=e207]:
          - paragraph [ref=e208]:
            - text: 💡
            - strong [ref=e209]: 一句话总结
            - text: ：Claude Code 有终端、编辑器插件、桌面 App、网页/手机五种形态，但
            - strong [ref=e210]: 底层同一个引擎，配置全平台通用
            - text: 。
        - separator [ref=e211]
        - heading "03 它能干什么：一张「能 / 不能」清单 Permalink to \"03 它能干什么：一张「能 / 不能」清单\"" [level=2] [ref=e212]:
          - text: 03 它能干什么：一张「能 / 不能」清单
          - link "Permalink to \"03 它能干什么：一张「能 / 不能」清单\"" [ref=e213] [cursor=pointer]:
            - /url: "#_03-它能干什么-一张「能-不能」清单"
            - text: "#"
        - paragraph [ref=e214]:
          - text: 这部分最实在。
          - strong [ref=e215]: 先看它能干的活儿
          - text: ——我按官方文档梳理，挑几类新手最有体感的：
        - list [ref=e216]:
          - listitem [ref=e217]:
            - strong [ref=e218]: 读懂你的代码
            - text: ：「这个函数干嘛的？」「这块为啥报错？」它结合整个项目上下文回答，不是孤立看一段。
          - listitem [ref=e219]:
            - strong [ref=e220]: 跨文件改代码
            - text: ：「把所有用
            - code [ref=e221]: var
            - text: 的地方改成
            - code [ref=e222]: let
            - text: 」「把这个大函数拆成三个小的」——它真的去改，不是只给建议。
          - listitem [ref=e223]:
            - strong [ref=e224]: 修 bug
            - text: ：把报错甩给它，它顺着代码库追根因、定位、动手修。
          - listitem [ref=e225]:
            - strong [ref=e226]: 干那些你一直拖着的杂活
            - text: ：给没测试的代码补测试、清 lint 报错、解合并冲突、升级依赖、写 release notes。
          - listitem [ref=e227]:
            - strong [ref=e228]: 跟 Git 打交道
            - text: ：暂存改动、写 commit 信息、建分支、开 PR（拉取请求）一条龙。
          - listitem [ref=e229]:
            - strong [ref=e230]: 连接外部工具
            - text: ：通过 MCP（一个开放标准，后面有专篇讲）读 Google Drive 的文档、更新 Jira 工单、从 Slack 拉数据。
        - paragraph [ref=e231]: 光说不够直观，给你一条官方文档里的真实命令感受一下「一句话指挥」是什么样：
        - generic [ref=e232]:
          - button "Copy Code" [ref=e233] [cursor=pointer]
          - generic [ref=e234]: bash
          - code [ref=e236]:
            - generic [ref=e237]: claude "write tests for the auth module, run them, and fix any failures"
        - paragraph [ref=e238]:
          - text: 翻译过来就是：「给 auth 模块写测试，跑一遍，挂了的你自己修。」——一句话，它把写测试、跑测试、修失败三步全包了。
          - strong [ref=e239]: 这就是「代理」和「补全」的本质区别。
        - paragraph [ref=e240]:
          - strong [ref=e241]: 但是
          - text: ，比「能做什么」更重要的，是认清它
          - strong [ref=e242]: 不能
          - text: 做什么。这点很关键，我也补充一下我的体会：
        - table [ref=e243]:
          - rowgroup [ref=e244]:
            - row "❌ 不该指望的 为什么" [ref=e245]:
              - columnheader "❌ 不该指望的" [ref=e246]
              - columnheader "为什么" [ref=e247]
          - rowgroup [ref=e248]:
            - row "替你拍板技术决策 选 A 方案还是 B 方案、值不值得重构——判断和取舍是你的活" [ref=e249]:
              - cell "替你拍板技术决策" [ref=e250]
              - cell "选 A 方案还是 B 方案、值不值得重构——判断和取舍是你的活" [ref=e251]
            - row "保证代码 100% 没 bug 它给的是高质量候选，不是绝对正确答案，必须你来 review" [ref=e252]:
              - cell "保证代码 100% 没 bug" [ref=e253]
              - cell "它给的是高质量候选，不是绝对正确答案，必须你来 review" [ref=e254]:
                - text: 它给的是高质量候选，不是绝对正确答案，
                - strong [ref=e255]: 必须你来 review
            - row "猜中你没说清的业务逻辑 你没讲明白的需求，它只能瞎猜" [ref=e256]:
              - cell "猜中你没说清的业务逻辑" [ref=e257]
              - cell "你没讲明白的需求，它只能瞎猜" [ref=e258]
            - row "你完全看不懂的情况下全自动托管项目 你看不懂，就没法判断它改得对不对，等于盲开" [ref=e259]:
              - cell "你完全看不懂的情况下全自动托管项目" [ref=e260]
              - cell "你看不懂，就没法判断它改得对不对，等于盲开" [ref=e261]
        - paragraph [ref=e262]:
          - text: 最容易踩的一个坑，就是第二条。太信它了，让它批量给一个项目加错误处理，它刷刷改了十几个文件，看都没细看就提交了。结果有两处它「自作主张」改了逻辑，上线后才发现。
          - strong [ref=e263]: 所以最好立一条铁规矩：它改的每一行，至少扫一遍 diff 再提交。
        - paragraph [ref=e264]: 用好 Claude Code 的心态基石，就一句话：
        - blockquote [ref=e265]:
          - paragraph [ref=e266]: 让 Claude Code 提供高质量候选方案，而不是绝对正确答案。
        - paragraph [ref=e267]:
          - text: 说白了就一句话——
          - strong [ref=e268]: 人定方向、把关、做判断；AI 负责执行、分析、干重复劳动
          - text: 。这是它的设计哲学：协作，不是替代。
        - blockquote [ref=e269]:
          - paragraph [ref=e270]:
            - text: 💡
            - strong [ref=e271]: 一句话总结
            - text: ：它能读项目、改文件、跑命令、干杂活，但拍板和把关永远是你的事——
            - strong [ref=e272]: 它是搭档，不是甩手掌柜的接盘侠
            - text: 。
        - separator [ref=e273]
        - heading "04 和 ChatGPT / Copilot / Cursor 到底差在哪 Permalink to \"04 和 ChatGPT / Copilot / Cursor 到底差在哪\"" [level=2] [ref=e274]:
          - text: 04 和 ChatGPT / Copilot / Cursor 到底差在哪
          - link "Permalink to \"04 和 ChatGPT / Copilot / Cursor 到底差在哪\"" [ref=e275] [cursor=pointer]:
            - /url: "#_04-和-chatgpt-copilot-cursor-到底差在哪"
            - text: "#"
        - paragraph [ref=e276]: 这是新手问得最多的问题，咱们一次说清。先上一张总表：
        - table [ref=e277]:
