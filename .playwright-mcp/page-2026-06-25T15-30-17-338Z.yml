            - strong [ref=e365]: 这正是下一篇要解决的第一件事
            - text: 。
        - paragraph [ref=e366]:
          - text: 提前剧透一下下一篇会用到的安装命令（
          - strong [ref=e367]: 现在别急着敲，先混个眼熟
