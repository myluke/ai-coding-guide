        - paragraph [ref=e390]: 这一篇咱们没敲几行命令，但把最该想明白的事捋清了：
        - list [ref=e391]:
          - listitem [ref=e392]:
            - strong [ref=e393]: 它是什么
            - text: ：Anthropic 官方的命令行版 AI 编程搭档，能读整个项目、直接改文件、跑命令——不是「会写代码的聊天框」。
          - listitem [ref=e394]:
            - strong [ref=e395]: 在哪用
            - text: ：终端、VS Code/JetBrains 插件、桌面 App、网页/手机，五种形态
            - strong [ref=e396]: 同一个引擎、配置通用
            - text: 。
          - listitem [ref=e397]:
            - strong [ref=e398]: 能 / 不能
            - text: ：能读代码、改文件、修 bug、干杂活、连外部工具；但拍板、把关、补业务逻辑这些
            - strong [ref=e399]: 永远是你的活
            - text: 。
          - listitem [ref=e400]:
            - strong [ref=e401]: 和别人的区别
            - text: ：ChatGPT 是顾问、Copilot 是智能输入法、它是能独立干活的搭档，
            - strong [ref=e402]: 按活儿派工，不必二选一
            - text: 。
        - paragraph [ref=e403]:
          - strong [ref=e404]: 你现在应该能
          - text: ：跟同事一句话讲清 Claude Code 是什么，也能判断「这个活儿该不该交给它」。这就是入门最该先有的「地图感」——后面所有功能，都是在这张地图上添砖加瓦。
