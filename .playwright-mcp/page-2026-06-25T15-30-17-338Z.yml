        - paragraph [ref=e318]: 再用三句大白话给你刻进脑子里：
        - list [ref=e319]:
          - listitem [ref=e320]:
            - strong [ref=e321]: ChatGPT
            - text: 像个
            - strong [ref=e322]: 顾问
            - text: ——啥都能聊两句，但你的项目它两眼一抹黑，干活得你自己来。
          - listitem [ref=e323]:
            - strong [ref=e324]: Copilot / Cursor
            - text: 像个
            - strong [ref=e325]: 智能输入法
            - text: ——你敲代码它猜你下一句想写啥，帮你打字快一点，主体还是你在写。
          - listitem [ref=e326]:
            - strong [ref=e327]: Claude Code
            - text: 像个
            - strong [ref=e328]: 能独立干活的搭档
            - text: ——你说清要什么，剩下的翻文件、改代码、跑测试它包圆，干完你来验收。
        - paragraph [ref=e329]:
          - strong [ref=e330]: 注意：
          - text: 这里的 Cursor / Copilot 指的是它们最经典的「编辑器内自动补全」定位。它们这两年也在做更「代理化」的功能（比如 Cursor 的 Agent 模式），边界在变模糊。但
          - strong [ref=e331]: 作为入门理解，记住上面这三句的核心定位就够了。
          - text: （产品功能迭代快，细节以各家官方为准。）
        - paragraph [ref=e332]: 那 Claude Code 强在哪、弱在哪？实测下来：
        - paragraph [ref=e333]:
          - strong [ref=e334]: 它的强项
          - text: ——对整个项目的理解能力是真的强，尤其接手一个看不懂的旧项目，让它「先给我讲讲这项目架构」，比自己啃半天文档快得多；大规模重构、跨文件改动也是它的主场。再加上能用
          - code [ref=e335]: CLAUDE.md
          - text: 、Skill 这些把它「调教」成符合你习惯的样子（后面专篇细讲）。
        - paragraph [ref=e336]:
          - strong [ref=e337]: 它的短板
          - text: ——不如 Copilot 那样「无感」。Copilot 是你写着写着它就帮你补了，零操作成本；Claude Code 得你主动开口下指令，学习曲线也稍陡一点。
          - strong [ref=e338]: 所以它俩不是替代关系，是配合关系
          - text: ——一种顺手的搭配是写代码时开着 Copilot 补全，遇到「要动一大片」的活儿就切给 Claude Code。
        - blockquote [ref=e339]:
          - paragraph [ref=e340]:
            - text: 💡
            - strong [ref=e341]: 一句话总结
            - text: ：ChatGPT 是顾问、Copilot 是智能输入法、Claude Code 是能动手的搭档——
            - strong [ref=e342]: 别二选一，按活儿派工
            - text: 。
        - separator [ref=e343]
        - heading "05 动手：30 秒确认你的电脑认不认识它 Permalink to \"05 动手：30 秒确认你的电脑认不认识它\"" [level=2] [ref=e344]:
