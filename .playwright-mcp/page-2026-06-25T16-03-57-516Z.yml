          - paragraph [ref=e429]:
            - text: 光看原理记不住，跑一个最小实验，亲眼看它「想→做→看」转一圈。
            - strong [ref=e430]: 这个实验不依赖任何现成项目
            - text: ，新建个空文件夹就能做。
