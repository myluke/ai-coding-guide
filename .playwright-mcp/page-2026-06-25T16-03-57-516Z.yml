        - generic [ref=e151]:
          - heading "03 · Claude Code 如何工作 Permalink to \"03 · Claude Code 如何工作\"" [level=1] [ref=e152]:
            - text: 03 · Claude Code 如何工作
            - link "Permalink to \"03 · Claude Code 如何工作\"" [ref=e153] [cursor=pointer]:
              - /url: "#_03-·-claude-code-如何工作"
              - text: "#"
          - blockquote [ref=e154]:
            - paragraph [ref=e155]:
              - text: 📚
              - strong [ref=e156]: 系列导航
              - text: ：上一篇
              - link "02 · 安装与使用" [ref=e157] [cursor=pointer]:
                - /url: ./02-install
              - text: 带你把 Claude Code 装好、跑起来。这一篇拆开盖子，看清它到底怎么干活——为什么它能自己读代码、改文件、跑命令，而不只是聊天。
          - paragraph [ref=e158]: 第一次用 Claude Code，常会撞见这么一段对话——
          - blockquote [ref=e159]:
            - paragraph [ref=e160]:
              - text: 你：「这个测试为啥挂了？」 Claude：「我先跑一下测试套件看看。」（开始跑命令） Claude：「报错说
              - code [ref=e161]: validateEmail
              - text: 返回了 undefined，我去看看这个函数。」（读了文件） Claude：「找到了，这里少了一个 return。我改一下，然后重新跑测试确认。」（改完，又跑了一次） Claude：「测试过了。」
          - paragraph [ref=e162]:
            - text: 看到这儿容易有点懵：
            - strong [ref=e163]: 只问了一句话，它怎么自己跑命令、自己读文件、自己改、还自己验证了？
          - paragraph [ref=e164]:
            - text: 说白了，这就是 Claude Code 和普通 AI 聊天框最大的区别。聊天框只会「回你一段文字」，而 Claude Code 会
            - strong [ref=e165]: 自己动手做事
            - text: 。这背后是一套固定的工作机制，今天讲透。
          - paragraph [ref=e166]:
            - strong [ref=e167]: 看完这一篇，你会拿到：
          - list [ref=e168]:
            - listitem [ref=e169]: 一张图看懂 Claude Code 的「代理循环」——它每做一件事都在重复的三个动作
            - listitem [ref=e170]: 搞清楚它手里那 5 类「工具」分别能干啥，以及它怎么决定用哪个
            - listitem [ref=e171]: 知道它到底能看到你电脑上的什么、看不到什么（关系到安全）
            - listitem [ref=e172]: 一个能照着跑的小实验，亲眼看它走完一整个循环
          - separator [ref=e173]
          - heading "01 代理循环：想 → 做 → 看 Permalink to \"01 代理循环：想 → 做 → 看\"" [level=2] [ref=e174]:
            - text: 01 代理循环：想 → 做 → 看
            - link "Permalink to \"01 代理循环：想 → 做 → 看\"" [ref=e175] [cursor=pointer]:
              - /url: "#_01-代理循环-想-→-做-→-看"
              - text: "#"
          - paragraph [ref=e176]:
            - text: 先说结论：
            - strong [ref=e177]: Claude Code 干任何活，都在重复三个动作——收集上下文、采取行动、验证结果
            - text: 。官方把这套机制叫「代理循环（agentic loop）」。
          - paragraph [ref=e178]:
            - text: 换个更土的说法：
            - strong [ref=e179]: 想 → 做 → 看
            - text: 。
          - list [ref=e180]:
            - listitem [ref=e181]:
              - strong [ref=e182]: 想
              - text: （收集上下文）：先搞清楚状况——读相关文件、看报错、查 git 状态
            - listitem [ref=e183]:
              - strong [ref=e184]: 做
              - text: （采取行动）：动手——改代码、跑命令、新建文件
            - listitem [ref=e185]:
              - strong [ref=e186]: 看
              - text: （验证结果）：检查刚才做的对不对——跑测试、看输出，不对就再来一轮
          - paragraph [ref=e187]:
            - strong [ref=e188]: 类比：一个靠谱的修车师傅。
            - text: 你把车开进店说「方向盘抖」，师傅不会立刻拆。他先
            - strong [ref=e189]: 看一圈、试开两步
            - text: （想），再
            - strong [ref=e190]: 动扳手
            - text: （做），修完
            - strong [ref=e191]: 开一段确认不抖了
            - text: （看）。还抖就回第一步重查。Claude Code 就是这么个师傅，只不过修的是你的代码。
          - paragraph [ref=e192]: 回到开头那段对话，对照一下你就懂了：
          - table [ref=e193]:
            - rowgroup [ref=e194]:
              - row "Claude 说的话 对应循环里的哪一步" [ref=e195]:
                - columnheader "Claude 说的话" [ref=e196]
                - columnheader "对应循环里的哪一步" [ref=e197]
            - rowgroup [ref=e198]:
              - row "「我先跑一下测试套件」 想（收集上下文）" [ref=e199]:
                - cell "「我先跑一下测试套件」" [ref=e200]
                - cell "想（收集上下文）" [ref=e201]
              - row "「报错说 undefined，我去看看这个函数」 想（继续收集）" [ref=e202]:
                - cell "「报错说 undefined，我去看看这个函数」" [ref=e203]
                - cell "想（继续收集）" [ref=e204]
              - row "「这里少了 return，我改一下」 做（采取行动）" [ref=e205]:
                - cell "「这里少了 return，我改一下」" [ref=e206]
                - cell "做（采取行动）" [ref=e207]
              - row "「然后重新跑测试确认」 看（验证结果）" [ref=e208]:
                - cell "「然后重新跑测试确认」" [ref=e209]
                - cell "看（验证结果）" [ref=e210]
              - row "「测试过了」 循环结束" [ref=e211]:
                - cell "「测试过了」" [ref=e212]
                - cell "循环结束" [ref=e213]
          - paragraph [ref=e214]:
            - text: 它把这三步
            - strong [ref=e215]: 串成一条链
            - text: ，一步的结果决定下一步干什么。修个 bug 可能循环好几轮，问个「这段代码啥意思」可能只要「想」这一步就够。
            - strong [ref=e216]: 循环几轮，由任务复杂度决定，不是写死的。
          - paragraph [ref=e217]:
            - img "代理循环：想 → 做 → 看" [ref=e218]
          - paragraph [ref=e219]:
            - text: 上面这张图就是 Claude Code 每次干活转的圈：从「想」到「做」到「看」，不满意就从「看」拐回「想」再来一轮——你随时能按
            - code [ref=e220]: Esc
            - text: 把它叫停。
          - paragraph [ref=e221]:
            - text: 这里有个关键点，很多人没意识到：
            - strong [ref=e222]: 你也是这个循环的一部分
            - text: 。它走偏了，你随时能插话纠正——这点下一节细说。
          - paragraph [ref=e223]:
            - text: 驱动这个循环的是两样东西：
            - strong [ref=e224]: 模型负责「想」，工具负责「做」和「看」
            - text: 。
          - paragraph [ref=e225]:
            - text: 模型就是 Claude 的大脑——Sonnet 应付日常编程够用，Opus 推理更强、适合复杂架构。会话里输入
            - code [ref=e226]: /model
            - text: 随时切，或者启动时
            - code [ref=e227]: claude --model sonnet
            - text: 。
          - blockquote [ref=e228]:
            - paragraph [ref=e229]:
              - text: 💡
              - strong [ref=e230]: 一句话总结
              - text: ：Claude Code 不是「回你一段话」，而是「想→做→看」转圈直到把事办完，
              - strong [ref=e231]: 这才是它和聊天框的本质区别
              - text: 。
          - separator [ref=e232]
          - heading "02 你也在循环里：随时能打断 Permalink to \"02 你也在循环里：随时能打断\"" [level=2] [ref=e233]:
            - text: 02 你也在循环里：随时能打断
            - link "Permalink to \"02 你也在循环里：随时能打断\"" [ref=e234] [cursor=pointer]:
              - /url: "#_02-你也在循环里-随时能打断"
              - text: "#"
          - paragraph [ref=e235]:
            - text: 上一节结尾说了：你也是这个循环的一部分。展开聊聊。普通 AI 聊天是「你问一句、它答一段、回合结束」。Claude Code 不一样——它在循环里自己跑的时候，
            - strong [ref=e236]: 你不用干等着，随时能插手
            - text: 。
          - paragraph [ref=e237]:
            - text: 比如让它重构一个模块，看它跑偏了、正要大改一堆文件，直接按
            - code [ref=e238]: Esc
            - text: ，它立刻停下，正在跑的命令也取消了。再补一句「别动那个文件，只改这个函数」，它就顺着新指示继续。
          - paragraph [ref=e239]: 两种打断方式，区别要分清：
          - table [ref=e240]:
            - rowgroup [ref=e241]:
              - row "操作 效果 什么时候用" [ref=e242]:
                - columnheader "操作" [ref=e243]
                - columnheader "效果" [ref=e244]
                - columnheader "什么时候用" [ref=e245]
            - rowgroup [ref=e246]:
              - row "按 Esc 立刻停，正在跑的工具调用被取消，等你下一条指令 它跑偏了、要做的事不对，赶紧拦住" [ref=e247]:
                - cell "按 Esc" [ref=e248]:
                  - text: 按
                  - code [ref=e249]: Esc
                - cell "立刻停，正在跑的工具调用被取消，等你下一条指令" [ref=e250]:
                  - strong [ref=e251]: 立刻停
                  - text: ，正在跑的工具调用被取消，等你下一条指令
                - cell "它跑偏了、要做的事不对，赶紧拦住" [ref=e252]
              - row "打字 + Enter 不打断当前操作，发一句补充，它做完手头的就读 只是想补个上下文、提个醒，不急着叫停" [ref=e253]:
                - cell "打字 + Enter" [ref=e254]:
                  - text: 打字 +
                  - code [ref=e255]: Enter
                - cell "不打断当前操作，发一句补充，它做完手头的就读" [ref=e256]:
                  - strong [ref=e257]: 不打断当前操作
                  - text: ，发一句补充，它做完手头的就读
                - cell "只是想补个上下文、提个醒，不急着叫停" [ref=e258]
          - blockquote [ref=e259]:
            - paragraph [ref=e260]:
              - text: 你不需要憋一个「完美的提示」。先说个大概，看它做，不对再纠正——
              - strong [ref=e261]: 这是对话，不是一次性命令
              - text: 。
          - paragraph [ref=e262]:
            - text: 这话是官方文档原话，特别值得记住。刚上手时总想「一句话把需求说全」，憋半天。其实没必要：丢个大方向，它做错了再喊停，
            - strong [ref=e263]: 迭代比憋大招快得多
            - text: 。
          - blockquote [ref=e264]:
            - paragraph [ref=e265]:
              - text: 💡
              - strong [ref=e266]: 一句话总结
              - text: ：它自主干活，但
              - strong [ref=e267]: 永远听你指挥
              - text: ——
              - code [ref=e268]: Esc
              - text: 急停、打字补充，方向盘随时在你手里。
          - separator [ref=e269]
          - heading "03 工具：它能真正动手的原因 Permalink to \"03 工具：它能真正动手的原因\"" [level=2] [ref=e270]:
            - text: 03 工具：它能真正动手的原因
            - link "Permalink to \"03 工具：它能真正动手的原因\"" [ref=e271] [cursor=pointer]:
              - /url: "#_03-工具-它能真正动手的原因"
              - text: "#"
          - paragraph [ref=e272]:
            - text: 上一节说模型负责「想」。那「做」和「看」靠什么？
            - strong [ref=e273]: 工具。
          - paragraph [ref=e274]:
            - text: 这是 Claude Code 最该记住的一句话：
            - strong [ref=e275]: 没有工具，Claude 只能回你文字；有了工具，它能真的读你的代码、改你的文件、跑你的命令。
          - paragraph [ref=e276]:
            - strong [ref=e277]: 类比：一个戴了智能手环的助理。
            - text: 光会说话的助理只能出主意；给他配上能开门、打字、查资料的设备，他才能真正替你把事办了。工具就是 Claude Code 的「手」。
