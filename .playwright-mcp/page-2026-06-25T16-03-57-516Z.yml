            - listitem [ref=e480]:
              - text: 把测试输出贴给你，
              - strong [ref=e481]: 预期是类似
              - text: ：
          - generic [ref=e482]:
            - button "Copy Code" [ref=e483] [cursor=pointer]
            - generic [ref=e484]: text
            - code [ref=e486]:
              - generic [ref=e487]: 测试通过：add(2, 3) == 5 ✓ add(-1, 1) == 0 ✓ add(0, 0) == 0 ✓
          - paragraph [ref=e488]:
            - text: 到这儿，你就完整看了一遍循环：
            - strong [ref=e489]: 想（出计划）→ 做（建文件、写代码）→ 看（跑测试报告结果）
            - text: 。
          - paragraph [ref=e490]:
            - strong [ref=e491]: 第四步（可选）：故意制造一次「再循环」。
          - paragraph [ref=e492]: 跟它说：「把 add 改成减法，但函数名别变，然后重新跑测试。」
