              - text: 才有，前 4 类是开箱即用的。以官方文档为准。
          - paragraph [ref=e317]:
            - text: 那它
            - strong [ref=e318]: 怎么决定用哪个工具
            - text: ？不是你指定的，是
            - strong [ref=e319]: 模型自己根据你的话和当前进展挑
            - text: 。
          - paragraph [ref=e320]: 举个官方的例子，你说一句「修复失败的测试」，它内部大概会这么走：
          - list [ref=e321]:
            - listitem [ref=e322]:
              - text: 跑测试套件，看哪个挂了 —— 用了
              - strong [ref=e323]: 执行
            - listitem [ref=e324]:
              - text: 读报错输出 ——
              - strong [ref=e325]: 执行
            - listitem [ref=e326]:
              - text: 搜相关源文件 ——
              - strong [ref=e327]: 搜索
            - listitem [ref=e328]:
              - text: 读这些文件理解逻辑 ——
              - strong [ref=e329]: 文件操作
            - listitem [ref=e330]:
              - text: 改文件修 bug ——
              - strong [ref=e331]: 文件操作
            - listitem [ref=e332]:
              - text: 再跑一次测试验证 ——
              - strong [ref=e333]: 执行
          - paragraph [ref=e334]:
            - text: 看出来没？
            - strong [ref=e335]: 这 6 步就是「想→做→看」循环在工具层面的展开
            - text: 。每用一次工具，就拿回一点新信息，喂给模型决定下一步——循环就是这么转起来的。
          - paragraph [ref=e336]:
            - text: 有个很典型的场景：让它给一个没文档的老项目「理一下目录结构」。它不用你喂任何文件，自己
            - code [ref=e337]: ls
            - text: 、自己
            - code [ref=e338]: grep
            - text: 关键字、读了七八个文件，最后画出一张结构图。
            - strong [ref=e339]: 全程没指定任何一个文件
            - text: ——这就是官方说的「委派，不要指示」：给方向，细节它自己抠。
          - paragraph [ref=e340]:
            - text: 至于 Skill、MCP、Hook、Subagent 这些——它们是
            - strong [ref=e341]: 架在这 5 类内置工具之上的扩展层
            - text: ，能让 Claude 知道更多、连更多外部服务。本系列后面一篇篇讲，先知道有这么回事就行。
          - blockquote [ref=e342]:
            - paragraph [ref=e343]:
              - text: 💡
              - strong [ref=e344]: 一句话总结
              - text: ：工具是 Claude Code 的「手」，5 类各管一摊；
              - strong [ref=e345]: 用哪个、用几次，它自己决定
              - text: ，你只管说目标。
          - separator [ref=e346]
          - heading "04 它能看到你电脑上的什么 Permalink to \"04 它能看到你电脑上的什么\"" [level=2] [ref=e347]:
            - text: 04 它能看到你电脑上的什么
            - link "Permalink to \"04 它能看到你电脑上的什么\"" [ref=e348] [cursor=pointer]:
              - /url: "#_04-它能看到你电脑上的什么"
              - text: "#"
          - paragraph [ref=e349]:
            - text: 这一节关系到安全，得说清楚。很多人第一次用会犯嘀咕：
            - strong [ref=e350]: 它是不是把我整个硬盘都翻了一遍传走了？
            - text: 不是。
          - paragraph [ref=e351]:
            - text: 先记一句话：
            - strong [ref=e352]: Claude Code 的「视野」基本等于你在那个目录下的终端能摸到的东西
            - text: 。你在哪个文件夹敲的
            - code [ref=e353]: claude
            - text: ，它的活动范围就以那儿为中心。
          - paragraph [ref=e354]:
            - text: 按官方文档，当你在某个目录运行
            - code [ref=e355]: claude
            - text: ，它能访问：
          - list [ref=e356]:
            - listitem [ref=e357]:
              - strong [ref=e358]: 你的项目
              - text: ：当前目录和子目录里的文件（其他地方的文件需要你给权限才碰）
            - listitem [ref=e359]:
              - strong [ref=e360]: 你的终端
              - text: ：你能跑的任何命令——构建工具、git、包管理器、脚本。
              - strong [ref=e361]: 命令行能干的，它就能干
            - listitem [ref=e362]:
              - strong [ref=e363]: 你的 git 状态
              - text: ：当前分支、未提交的改动、最近的提交历史
            - listitem [ref=e364]:
              - strong [ref=e365]:
                - text: 你的
                - code [ref=e366]: CLAUDE.md
              - text: ：你写的项目专属说明书，每次会话它都会读（这文件后面有专篇讲）
            - listitem [ref=e367]:
              - strong [ref=e368]: 你配置的扩展
              - text: ：MCP、Skill、Subagent 这些
          - paragraph [ref=e369]:
            - text: 正因为它能看到
            - strong [ref=e370]: 整个项目
            - text: ，而不只是你当前打开的那一个文件，所以它能跨文件协调——你说「修登录 bug」，它能搜出相关的好几个文件、一起改、再跑测试验证。
            - strong [ref=e371]: 这和只看当前文件的内联补全插件，根本不是一回事。
          - paragraph [ref=e372]: 那安全怎么保证？两道闸——
          - paragraph [ref=e373]:
            - strong [ref=e374]: 第一道：检查点（checkpoint），相当于游戏存档。
            - text: 它改任何文件之前，会先给当前内容拍个快照。改坏了，在
            - strong [ref=e375]:
              - text: 输入框空着时连按两次
              - code [ref=e376]: Esc
            - text: （或输入
            - code [ref=e377]: /rewind
            - text: ），会弹出一个「回溯菜单」，选「恢复代码」就把文件退回改之前；也可以直接说「撤销刚才的修改」。
          - blockquote [ref=e378]:
            - paragraph [ref=e379]:
              - strong [ref=e380]: 检查点只管 Claude 用编辑工具改的文件——bash 命令改的、以及外部副作用都不在内。
              - text: 数据库、API、线上部署这类「泼出去收不回」的操作没法存档——所以 Claude 在跑这类有外部影响的命令前会
              - strong [ref=e381]: 先问你
              - text: 。
          - paragraph [ref=e382]:
            - text: 这里有个常踩的坑：有时它改了五六个文件，你看完觉得方向全错。搁以前得手动一个个
            - code [ref=e383]: git checkout
            - text: 回滚，现在按两下
            - code [ref=e384]: Esc
            - text: 、在弹出的菜单里选「恢复代码」——
            - strong [ref=e385]: 五个文件齐刷刷回到改之前
            - text: ，干净利落。有了这一手，放手让它改代码就没那么怵了。
          - paragraph [ref=e386]:
            - strong [ref=e387]: 第二道：权限模式，相当于实习生动手前问不问你。
            - text: 按
            - code [ref=e388]: Shift+Tab
            - text: 循环切换：
          - table [ref=e389]:
            - rowgroup [ref=e390]:
              - row "权限模式 Claude 的行为" [ref=e391]:
                - columnheader "权限模式" [ref=e392]
                - columnheader "Claude 的行为" [ref=e393]
            - rowgroup [ref=e394]:
              - row "默认 改文件、跑命令前都问你" [ref=e395]:
                - cell "默认" [ref=e396]:
                  - strong [ref=e397]: 默认
                - cell "改文件、跑命令前都问你" [ref=e398]
              - row "自动接受编辑 改文件和常见文件命令（如 mkdir、mv）不问，其他命令仍问" [ref=e399]:
                - cell "自动接受编辑" [ref=e400]:
                  - strong [ref=e401]: 自动接受编辑
                - cell "改文件和常见文件命令（如 mkdir、mv）不问，其他命令仍问" [ref=e402]:
                  - text: 改文件和常见文件命令（如
                  - code [ref=e403]: mkdir
                  - text: 、
                  - code [ref=e404]: mv
                  - text: ）不问，其他命令仍问
              - row "Plan Mode（计划模式） 可读文件和运行探索性命令，但不编辑源代码；先给你一份计划，你批准了才动手" [ref=e405]:
                - cell "Plan Mode（计划模式）" [ref=e406]:
                  - strong [ref=e407]: Plan Mode（计划模式）
                - cell "可读文件和运行探索性命令，但不编辑源代码；先给你一份计划，你批准了才动手" [ref=e408]
              - row "自动模式 用后台安全检查评估所有操作（实验性，目前是研究预览，可能变化）" [ref=e409]:
                - cell "自动模式" [ref=e410]:
                  - strong [ref=e411]: 自动模式
                - cell "用后台安全检查评估所有操作（实验性，目前是研究预览，可能变化）" [ref=e412]:
                  - text: 用后台安全检查评估所有操作（
                  - strong [ref=e413]: 实验性，目前是研究预览，可能变化
                  - text: ）
          - paragraph [ref=e414]:
            - text: 最值得养成的习惯是用
            - strong [ref=e415]: Plan Mode
            - text: ：复杂任务先按两下
            - code [ref=e416]: Shift+Tab
            - text: 进去，让它「只分析、出方案、别动手」，方案过一遍、改改，确认了再放它执行。
            - strong [ref=e417]: 这能躲过好几次「方向错了改一半」的返工
            - text: ——先看图纸再施工，比边干边改省事太多。
          - paragraph [ref=e418]:
            - text: 嫌每次都问烦？可以在项目的
            - code [ref=e419]: .claude/settings.json
            - text: 里把信任的命令（比如
            - code [ref=e420]: npm test
            - text: 、
            - code [ref=e421]: git status
            - text: ）加白名单，以后不问。配置细节后面专篇讲。
          - blockquote [ref=e422]:
            - paragraph [ref=e423]:
              - text: 💡
              - strong [ref=e424]: 一句话总结
              - text: ：它的视野≈你在那个目录的终端权限；
              - strong [ref=e425]: 检查点管「改坏了能撤」，权限模式管「动手前问不问」
              - text: ——两道闸下，放手用也踏实。
          - separator [ref=e426]
          - heading "05 动手：亲眼看它走一个完整循环 Permalink to \"05 动手：亲眼看它走一个完整循环\"" [level=2] [ref=e427]:
            - text: 05 动手：亲眼看它走一个完整循环
