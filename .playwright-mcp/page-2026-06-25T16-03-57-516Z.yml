            - strong [ref=e432]: 第一步：建个空目录，进去启动 Claude Code。
          - paragraph [ref=e433]:
            - text: 在终端里跑（Mac / Linux；Windows 用 PowerShell 把
            - code [ref=e434]: mkdir -p
            - text: 换成
            - code [ref=e435]: mkdir
