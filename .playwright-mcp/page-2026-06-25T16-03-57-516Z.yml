          - paragraph [ref=e468]:
            - text: 这就是「想」——它在动手前先理清了思路。
            - strong [ref=e469]: 注意它停下来等你批准了，这是计划模式的特征。
          - paragraph [ref=e470]:
            - strong [ref=e471]: 第三步：批准，看它「做」+「看」。
          - paragraph [ref=e472]: 回复「可以，开始吧」。接着你会看到它依次：
          - list [ref=e473]:
            - listitem [ref=e474]:
              - strong [ref=e475]: 建文件
              - text: （文件操作工具）——可能先弹一下权限确认，你按同意
            - listitem [ref=e476]:
              - text: 写完后
              - strong [ref=e477]: 跑测试
              - text: （执行工具），比如执行
              - code [ref=e478]: python add.py
