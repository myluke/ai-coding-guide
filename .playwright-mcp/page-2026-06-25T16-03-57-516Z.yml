          - generic [ref=e458]:
            - button "Copy Code" [ref=e459] [cursor=pointer]
            - generic [ref=e460]: text
            - code [ref=e462]:
              - generic [ref=e463]: 计划：
              - generic [ref=e464]: 1. 创建 add.py，实现 add(a, b)
              - generic [ref=e465]: 2. 创建测试（用 assert 或 pytest）
